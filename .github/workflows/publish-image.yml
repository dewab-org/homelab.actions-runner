name: Publish Runner Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-image.yml"
      - "Dockerfile"
      - "scripts/**"

permissions:
  contents: read
  packages: write

concurrency:
  group: arc-runners-single-job
  cancel-in-progress: false

env:
  IMAGE_NAME: actions-runner

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Write homelab CA bundle
        id: homelab_ca
        env:
          HOMELAB_CA_PEM: ${{ secrets.HOMELAB_CA_PEM }}
        run: |
          set -euo pipefail

          if [ -z "${HOMELAB_CA_PEM:-}" ]; then
            echo "::error::HOMELAB_CA_PEM is not configured for this repository."
            exit 1
          fi

          ca_file="${RUNNER_TEMP}/homelab-ca.pem"
          printf '%s\n' "${HOMELAB_CA_PEM}" > "${ca_file}"
          echo "file=${ca_file}" >> "${GITHUB_OUTPUT}"

      - name: Resolve tool versions
        id: versions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          latest_release() {
            local repo="$1"
            curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/hashicorp/${repo}/releases/latest" | jq -r '.tag_name | ltrimstr("v")'
          }

          echo "packer=$(latest_release packer)" >> "${GITHUB_OUTPUT}"
          echo "terraform=$(latest_release terraform)" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          provenance: false
          push: true
          build-args: |
            PACKER_VERSION=${{ steps.versions.outputs.packer }}
            TERRAFORM_VERSION=${{ steps.versions.outputs.terraform }}
          secret-files: |
            homelab_ca=${{ steps.homelab_ca.outputs.file }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.description=Custom ARC runner with homelab CA, Ansible, Packer, Terraform, and Python
