name: Publish Runner Image

on:
  workflow_dispatch:
    inputs:
      runner_label:
        description: Optional ARC runner scale set name
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-image.yml"
      - "Dockerfile"
      - "scripts/**"

permissions:
  contents: read
  id-token: write
  packages: write

concurrency:
  group: arc-runners-single-job
  cancel-in-progress: false

env:
  IMAGE_NAME: actions-runner
  DEFAULT_VAULT_AUTH_PATH: github-actions
  DEFAULT_VAULT_CA_SECRET_PATH: secret/data/github-arc
  DEFAULT_VAULT_CA_SECRET_KEY: ca_crt

jobs:
  publish:
    runs-on: ${{ github.event.inputs.runner_label || 'arc-runners' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Bootstrap Vault TLS trust
        env:
          VAULT_ADDR: ${{ vars.VAULT_ADDR }}
          VAULT_SERVER_CA_PEM: ${{ secrets.VAULT_SERVER_CA_PEM }}
        run: |
          set -euo pipefail

          ca_file="${RUNNER_TEMP}/vault-server-ca.pem"

          if [ -n "${VAULT_SERVER_CA_PEM:-}" ]; then
            printf '%s\n' "${VAULT_SERVER_CA_PEM}" > "${ca_file}"
          elif [ -f "certs/homelab-root-ca-bundle.pem" ]; then
            cp "certs/homelab-root-ca-bundle.pem" "${ca_file}"
          else
            vault_hostport="${VAULT_ADDR#https://}"
            vault_hostport="${vault_hostport%%/*}"
            vault_host="${vault_hostport%%:*}"
            vault_port="${vault_hostport##*:}"
            if [ "${vault_port}" = "${vault_hostport}" ]; then
              vault_port="443"
            fi

            openssl s_client \
              -showcerts \
              -servername "${vault_host}" \
              -connect "${vault_host}:${vault_port}" </dev/null 2>/dev/null \
              | awk '/-----BEGIN CERTIFICATE-----/,/-----END CERTIFICATE-----/ { print }' > "${ca_file}"
          fi

          test -s "${ca_file}"

          {
            echo "NODE_EXTRA_CA_CERTS=${ca_file}"
            echo "SSL_CERT_FILE=${ca_file}"
            echo "CURL_CA_BUNDLE=${ca_file}"
            echo "REQUESTS_CA_BUNDLE=${ca_file}"
          } >> "${GITHUB_ENV}"

      - name: Resolve tool versions
        id: versions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          latest_release() {
            local repo="$1"
            curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/hashicorp/${repo}/releases/latest" | jq -r '.tag_name | ltrimstr("v")'
          }

          echo "packer=$(latest_release packer)" >> "${GITHUB_OUTPUT}"
          echo "terraform=$(latest_release terraform)" >> "${GITHUB_OUTPUT}"

      - name: Import CA from Vault
        id: vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ vars.VAULT_ADDR }}
          path: ${{ vars.VAULT_AUTH_PATH || env.DEFAULT_VAULT_AUTH_PATH }}
          method: jwt
          role: ${{ vars.VAULT_AUTH_ROLE }}
          caCertificate: ${{ secrets.VAULT_SERVER_CA_PEM }}
          secrets: |
            ${{ vars.VAULT_CA_SECRET_PATH || env.DEFAULT_VAULT_CA_SECRET_PATH }} ${{ vars.VAULT_CA_SECRET_KEY || env.DEFAULT_VAULT_CA_SECRET_KEY }} | homelab_ca

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          provenance: false
          push: true
          build-args: |
            PACKER_VERSION=${{ steps.versions.outputs.packer }}
            TERRAFORM_VERSION=${{ steps.versions.outputs.terraform }}
          secrets: |
            homelab_ca=${{ steps.vault.outputs.homelab_ca }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.description=Custom ARC runner with homelab CA, Ansible, Packer, Terraform, and Python
